<div class="d-flex vw-100 vh-100 overflow-hidden" style="background-color: #0B1114;">
  
  <aside class="sidebar d-flex flex-column align-items-center py-4 flex-shrink-0 z-3 shadow-lg" 
         style="width: 80px; border-right: 1px solid rgba(255,255,255,0.05); background-color: #0B1114;">
    
    <div class="brand-icon mb-5 text-neon" title="Íon Dashboard">
      <i class="bi bi-lightning-charge-fill fs-3" style="filter: drop-shadow(0 0 10px rgba(0, 229, 155, 0.4));"></i>
    </div>
    
    <nav class="nav-menu d-flex flex-column gap-4 w-100 align-items-center mt-3">
      <a href="javascript:void(0)" class="nav-link fs-5 text-muted-custom" title="Dashboard" (click)="voltar()"><i class="bi bi-house-door"></i></a>
      <a href="javascript:void(0)" class="nav-link active fs-5 text-neon" title="Mapa Interativo"><i class="bi bi-map"></i></a>
      <a href="javascript:void(0)" class="nav-link fs-5 text-muted-custom" title="Minha Garagem"><i class="bi bi-car-front"></i></a>
      <a href="javascript:void(0)" class="nav-link fs-5 text-muted-custom" title="Postos Favoritos"><i class="bi bi-star"></i></a>
    </nav>

    <div class="mt-auto w-100 d-flex justify-content-center">
      <a href="javascript:void(0)" class="nav-link btn-logout fs-5 text-muted-custom" title="Sair da Conta" (click)="sair()">
        <i class="bi bi-box-arrow-right"></i>
      </a>
    </div>
  </aside>

  <main class="flex-grow-1 position-relative overflow-hidden p-0 m-0 w-100 h-100">
    
    <div id="map" class="position-absolute top-0 start-0 w-100 h-100 z-0"></div>

    <div class="position-absolute top-0 start-50 translate-middle-x mt-4 z-3 pointer-events-auto d-flex gap-2" style="width: 100%; max-width: 500px; padding: 0 15px;">
      
      <button class="btn btn-dark rounded-circle shadow-lg d-flex align-items-center justify-content-center flex-shrink-0 hover-btn-neon" 
              style="width: 50px; height: 50px; background-color: #12181C; border: 1px solid rgba(255,255,255,0.08);"
              (click)="toggleLista()">
        <i class="bi" [ngClass]="mostrarLista ? 'bi-x-lg' : 'bi-list'"></i>
      </button>

      <div class="search-bar d-flex align-items-center px-4 rounded-pill shadow-lg flex-grow-1" style="background-color: #12181C; border: 1px solid rgba(255,255,255,0.08); height: 50px;">
        <i class="bi bi-search text-muted-custom me-3 fs-5"></i>
        <input type="text" placeholder="Procurar local..." class="bg-transparent border-0 text-white w-100 shadow-none input-busca">
      </div>
    </div>

    <div class="side-panel-map position-absolute top-0 start-0 h-100 d-flex flex-column pointer-events-auto shadow-lg" 
         [class.panel-open]="mostrarLista"
         style="width: 380px; background-color: rgba(18, 24, 28, 0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.08); z-index: 2;">
      
      <div class="p-4 border-bottom border-secondary border-opacity-10 mt-5 pt-5">
        <h5 class="text-white fw-bold m-0 mt-3">{{ totalEstacoes }} Postos Encontrados</h5>
        <span class="text-muted-custom fs-7">Mais próximos a você</span>
      </div>

      <div class="posto-list flex-grow-1 overflow-y-auto p-3 d-flex flex-column gap-3">
        
        <div *ngFor="let posto of postosOrdenados; let i = index" 
             class="list-item dash-card d-flex flex-column p-3 cursor-pointer hover-bg-dark transition-all" 
             style="border: 1px solid rgba(255,255,255,0.05); background-color: #0B1114; border-radius: 12px;"
             (click)="focarNoPosto(posto.lat, posto.lon, i)">
          
          <div class="d-flex align-items-start gap-3 w-100">
            <div class="icon-box-sm text-neon flex-shrink-0 mt-1"><i class="bi bi-lightning-charge"></i></div>
            <div class="flex-grow-1 min-w-0">
              <h6 class="text-white fw-semibold mb-1 text-truncate">{{ posto.nome }}</h6>
              <span class="text-muted-custom fs-7 d-block text-truncate mb-2">{{ posto.endereco }}</span>
              <div class="d-flex justify-content-between align-items-center">
                <span class="badge-dark-outline py-1 px-2 fs-7 rounded-pill" style="border: 1px solid rgba(255,255,255,0.1);" [ngClass]="posto.tagColor">{{ posto.tag }}</span>
                <span class="text-neon fw-semibold fs-7">{{ posto.distancia }} km</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </main>
</div>
