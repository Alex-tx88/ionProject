<div class="d-flex vw-100 vh-100 overflow-hidden" style="background-color: #0B1114;">
  
  <aside class="sidebar d-flex flex-column align-items-center py-4 flex-shrink-0 z-3 shadow-lg" 
         style="width: 80px; border-right: 1px solid rgba(255,255,255,0.05); background-color: #0B1114;">
    
    <div class="brand-icon mb-5 text-neon" title="Íon Dashboard">
      <i class="bi bi-lightning-charge-fill fs-3" style="filter: drop-shadow(0 0 10px rgba(0, 229, 155, 0.4));"></i>
    </div>
    
    <nav class="nav-menu d-flex flex-column gap-4 w-100 align-items-center mt-3">
      <a href="javascript:void(0)" class="nav-link fs-5 text-muted-custom" title="Dashboard" (click)="voltar()"><i class="bi bi-house-door"></i></a>
      <a href="javascript:void(0)" class="nav-link active fs-5 text-neon" title="Mapa Interativo"><i class="bi bi-map"></i></a>
      <a href="javascript:void(0)" class="nav-link fs-5 text-muted-custom" title="Minha Garagem"><i class="bi bi-car-front"></i></a>
      <a href="javascript:void(0)" class="nav-link fs-5 text-muted-custom" title="Postos Favoritos"><i class="bi bi-star"></i></a>
    </nav>

    <div class="mt-auto w-100 d-flex justify-content-center">
      <a href="javascript:void(0)" class="nav-link btn-logout fs-5 text-muted-custom" title="Sair da Conta" (click)="sair()">
        <i class="bi bi-box-arrow-right"></i>
      </a>
    </div>
  </aside>

  <main class="flex-grow-1 position-relative overflow-hidden p-0 m-0 w-100 h-100">
    
    <div id="map" class="position-absolute top-0 start-0 w-100 h-100 z-0"></div>

    <div class="position-absolute top-0 start-0 w-100 p-3 p-md-4 z-3 pointer-events-none d-flex align-items-center justify-content-between gap-3">
      
      <div class="d-flex align-items-center" style="flex: 1;">
         <button class="btn btn-dark shadow-lg d-flex align-items-center justify-content-center flex-shrink-0 hover-btn-neon pointer-events-auto" 
                 style="width: 48px; height: 48px; background-color: rgba(18, 24, 28, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px;"
                 (click)="toggleLista()">
            <i class="bi fs-5 text-white" [ngClass]="mostrarLista ? 'bi-x-lg' : 'bi-list'"></i>
         </button>
      </div>

      <div class="search-bar d-flex align-items-center px-3 shadow-lg flex-shrink-0 pointer-events-auto w-100" 
           style="background-color: rgba(18, 24, 28, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; height: 48px; max-width: 450px;">
         <i class="bi bi-search text-muted-custom me-2 fs-6"></i>
         <input type="text" placeholder="Buscar endereço em Salvador..." class="bg-transparent border-0 text-white w-100 shadow-none input-busca" style="outline: none; font-size: 14px;">
      </div>

      <div class="d-flex align-items-center justify-content-end" style="flex: 1;">
         <div class="dash-card p-2 px-3 d-none d-md-flex align-items-center gap-3 pointer-events-auto shadow-lg" 
              style="border-radius: 12px; background-color: rgba(18, 24, 28, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05);">
            <div class="d-flex flex-column text-end">
               <span class="text-white fw-bold mb-0" style="font-size: 14px; line-height: 1.2;">Olá, Alex</span>
               <span class="text-muted-custom" style="font-size: 12px;">{{ totalEstacoes }} ativos</span>
            </div>
            <div class="rounded-circle d-flex align-items-center justify-content-center text-neon fw-bold" 
                 style="width: 38px; height: 38px; background-color: rgba(0, 229, 155, 0.1); border: 1px solid rgba(0, 229, 155, 0.2); font-size: 14px;">AX</div>
         </div>
      </div>

    </div>

    <div class="side-panel-map position-absolute top-0 start-0 h-100 d-flex flex-column pointer-events-auto shadow-lg" 
         [class.panel-open]="mostrarLista"
         style="width: 380px; background-color: rgba(18, 24, 28, 0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.08); z-index: 2; padding-top: 100px;">
      
      <div class="p-4 border-bottom border-secondary border-opacity-10 mt-2">
        <h5 class="text-white fw-bold m-0">{{ totalEstacoes }} Postos Encontrados</h5>
        <span class="text-muted-custom fs-7">Baseado na sua localização</span>
      </div>

      <div class="posto-list flex-grow-1 overflow-y-auto p-3 d-flex flex-column gap-3">
        
        <div *ngFor="let posto of postosOrdenados; let i = index" 
             class="list-item dash-card d-flex flex-column p-3 cursor-pointer hover-bg-dark transition-all" 
             style="border: 1px solid rgba(255,255,255,0.05); background-color: #0B1114; border-radius: 12px;"
             (click)="focarNoPosto(posto.lat, posto.lon, i)">
          
          <div class="d-flex align-items-start gap-3 w-100">
            <div class="icon-box-sm text-neon flex-shrink-0 mt-1"><i class="bi bi-lightning-charge"></i></div>
            <div class="flex-grow-1 min-w-0">
              <h6 class="text-white fw-semibold mb-1 text-truncate">{{ posto.nome }}</h6>
              <span class="text-muted-custom fs-7 d-block text-truncate mb-2">{{ posto.endereco }}</span>
              <div class="d-flex justify-content-between align-items-center">
                <span class="badge-dark-outline py-1 px-2 fs-7 rounded-pill" style="border: 1px solid rgba(255,255,255,0.1);" [ngClass]="posto.tagColor">{{ posto.tag }}</span>
                <span class="text-neon fw-semibold fs-7">{{ posto.distancia }} km</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </main>
</div>
